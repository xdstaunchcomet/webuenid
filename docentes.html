<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Imágenes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            padding: 20px;
        }
        .image-box {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .image-box img {
            width: 100%;
            display: block;
        }
        .image-box p {
            margin: 0;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            background-color: #f9f9f9;
            color: #333;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; padding: 20px;">Galería de Imágenes</h1>
    <div class="container">
        <!-- Repite este bloque para agregar más imágenes -->
        <div class="image-box">
            <img src="https://via.placeholder.com/200" alt="Imagen 1">
            <p>Descripción 1</p>
        </div>

</html>
